<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vicocowork</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    .card {
      position: relative;
      text-align: center;
      padding: 60px 80px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .greeting {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 20px;
      font-weight: 500;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    h1 span {
      background: linear-gradient(135deg, #6366f1, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 8px;
      font-weight: 400;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      border-radius: 2px;
      margin: 32px auto;
    }

    .tagline {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <p class="greeting">Hello World</p>
    <h1>Sono <span>Vico</span> 👋</h1>
    <p class="subtitle">Benvenuto nel mio angolino su internet</p>
    <div class="divider"></div>
    <p class="tagline">mbMH02.github.io/vicocowork</p>
  </div>
</body>
</html>
